<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Result</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f2f5;
    }
    .result-card {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15);
      max-width: 400px;
      width: 100%;
    }
    .status {
      font-size: 1.8rem;
      margin-bottom: 15px;
      font-weight: bold;
    }
    .success { color: #28a745; }
    .failed { color: #dc3545; }
    .txn-id {
      font-size: 0.9rem;
      margin: 10px 0;
      color: #333;
    }
    .api-status {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #666;
    }
    button {
      margin-top: 20px;
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      background: #007bff;
      color: white;
      transition: background 0.2s;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="result-card">
    <div id="status" class="status"></div>
    <div id="txnId" class="txn-id"></div>
    <div id="apiStatus" class="api-status"></div>
    <button onclick="window.location.href='index.html'">Go to Home</button>
  </div>

  <script>
    function getQueryParams() {
      const params = {};
      const search = window.location.search.substring(1).split("&");
      for (let pair of search) {
        if (!pair) continue;
        let [key, value] = pair.split("=");
        params[decodeURIComponent(key)] = decodeURIComponent(value || "");
      }
      return params;
    }

    const params = getQueryParams();
    const statusEl = document.getElementById("status");
    const txnIdEl = document.getElementById("txnId");
    const apiStatusEl = document.getElementById("apiStatus");

    const responseCode = params["pp_ResponseCode"];
    const responseMessage = params["pp_ResponseMessage"] || "";
    const txnRef = params["pp_TxnRefNo"] || "N/A";
    const orderId = params["orderId"] || null; // make sure backend sends orderId in ReturnURL

    // Show frontend status
    if (responseCode === "000") {
      statusEl.textContent = "✅ Payment Successful";
      statusEl.classList.add("success");
    } else {
      statusEl.textContent = "❌ Payment Failed";
      statusEl.classList.add("failed");
    }

    txnIdEl.textContent = "Transaction Ref: " + txnRef;

    // 🔥 Auto-call backend to update order status
    if (orderId) {
      fetch(`http://localhost:5284/api/payment/update-status`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          orderId: orderId,
          status: responseCode === "000" ? "Paid" : "Failed",
          transactionRef: txnRef,
          message: responseMessage
        })
      })
      .then(res => res.json())
      .then(data => {
        apiStatusEl.textContent = "Order status updated in backend ✅";
      })
      .catch(err => {
        console.error("Backend update failed", err);
        apiStatusEl.textContent = "⚠ Could not update backend order status.";
      });
    } else {
      apiStatusEl.textContent = "⚠ No Order ID in Return URL.";
    }
  </script>
</body>
</html>
